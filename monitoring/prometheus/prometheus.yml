global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          environment: local

  - job_name: simple-commerce-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8080
        labels:
          environment: local
