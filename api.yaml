          type: string
          format: email
        password:
          type: string
          format: password
        user_type:
          type: string
          enum: [customer, seller]

    LoginResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
