    RefreshTokenResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: object
          required: [AccessToken, ExpiresIn]
          properties:
            AccessToken:
              type: string
            ExpiresIn:
              type: integer
              example: 900

    Customer:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        status:
